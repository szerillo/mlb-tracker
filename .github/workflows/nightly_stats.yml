name: Nightly stats refresh

# Once-per-night pass that pulls fresh FG/Savant stats AND recomputes the
# unified pitcher/hitter scores. Runs at 07:00 UTC = 03:00 EDT (02:00 EST).
#
# Why a separate workflow: the main "Data refresh" runs every 15 min during
# game hours and skips heavy stat pulls. Stats only change ~once a day
# (after games final), so we anchor them to a single nightly pass that
# happens after the box scores are finalized but before any morning users
# open the dashboard.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-stats
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      # ── PITCHERS ──────────────────────────────────────────────────────────
      - name: Refresh pitcher stats (FG dump)
        run: python scripts/refresh_pitcher_stats.py
        env:
          FORCE_RUN: "1"

      - name: Enrich pitcher_stats with xFIP / Stuff+ / Pitching+
        run: |
          python scripts/refresh_pitcher_stats_enrich.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true

      - name: Enrich pitcher_stats with projected FIP
        run: |
          python scripts/refresh_projections.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true

      - name: Enrich pitcher_stats with FG Pitcher Bot ERA
        run: |
          python scripts/refresh_bot_era.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true

      - name: Enrich pitcher_stats with Savant HR/9 / GB% / Whiff% / HH%
        run: |
          python scripts/refresh_pitcher_savant.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true

      - name: Pull pitcher arsenal (Savant per-pitch-type)
        run: |
          python scripts/refresh_pitcher_arsenal.py > /tmp/pa.json && mv /tmp/pa.json data/pitcher_arsenal.json || true

      # ── HITTERS ───────────────────────────────────────────────────────────
      - name: Enrich hitters with projected OPS / K% / BB% / actual wOBA
        run: |
          python scripts/refresh_hitter_stats_enrich.py data/hitters.json > /tmp/h.json && mv /tmp/h.json data/hitters.json || true

      - name: Pull hitter Statcast percentile rankings
        run: |
          python scripts/refresh_hitter_percentiles.py > /tmp/hp.json && mv /tmp/hp.json data/hitter_percentiles.json || true

      # ── UNIFIED SCORES (must run AFTER all enrichments above) ────────────
      - name: Compute unified pitcher score
        run: python scripts/compute_pitcher_score.py
        continue-on-error: true

      - name: Compute unified hitter score
        run: python scripts/compute_hitter_score.py
        continue-on-error: true

      # ── COMMIT ────────────────────────────────────────────────────────────
      - name: Commit changed data (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/ || true
          if git diff --cached --quiet; then
            echo "No nightly stats changes to commit."
          else
            git commit -m "Nightly stats refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
