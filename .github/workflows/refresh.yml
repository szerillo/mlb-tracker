name: Data refresh

on:
  schedule:
    # Game hours: every 15 min noon – 7:45 PM ET
    - cron: "*/15 16-23 * * *"
    # Late-game hourly: 8 PM, 9 PM, 10 PM, 11 PM, 12 AM, 1 AM, 2 AM ET
    - cron: "0 0,1,2,3,4,5,6 * * *"
    # Morning pass: 8 AM ET
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force all refresh steps to run regardless of game window"
        type: boolean
        default: true
  # Manual trigger: push to .manual-trigger to force a run
  push:
    paths:
      - ".manual-trigger"
      - ".train-now"
      - ".backfill-now"

concurrency:
  group: refresh
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps for enrichment scripts
        run: pip install requests beautifulsoup4 unidecode pandas numpy scikit-learn pyarrow pybaseball

      - name: Migrate misplaced files (idempotent self-heal)
        run: |
          mkdir -p data/odds_archive scripts
          if ls data/2026-*.json >/dev/null 2>&1; then
            echo "Moving odds archive JSONs from data/ to data/odds_archive/"
            mv data/2026-*.json data/odds_archive/
          fi
          if [ -f data/scrape_action_archive.py ]; then
            echo "Moving scrape_action_archive.py from data/ to scripts/"
            mv data/scrape_action_archive.py scripts/
          fi
        continue-on-error: true

      - name: Refresh umpire stats
        run: python scripts/refresh_umps.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Compute bullpen fatigue
        run: python scripts/compute_fatigue.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Refresh weather forecasts
        run: python scripts/refresh_weather.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Refresh lineups (confirmed + projected)
        run: python scripts/refresh_lineups.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Refresh pitcher stats (overnight only)
        run: python scripts/refresh_pitcher_stats.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Enrich pitcher_stats with xFIP / Stuff+ / Pitching+
        run: |
          python scripts/refresh_pitcher_stats_enrich.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true
        continue-on-error: true

      - name: Enrich pitcher_stats with projected FIP (ATC / BatX / OOPSY / ZiPS)
        run: |
          python scripts/refresh_projections.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true
        continue-on-error: true

      - name: Enrich pitcher_stats with FG Pitcher Bot ERA
        run: |
          python scripts/refresh_bot_era.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true
        continue-on-error: true

      - name: Enrich pitcher_stats with Savant HR/9 / GB% / Whiff% / HH%
        run: |
          python scripts/refresh_pitcher_savant.py data/pitcher_stats.json > /tmp/ps.json && mv /tmp/ps.json data/pitcher_stats.json || true
        continue-on-error: true

      - name: Pull pitcher arsenal (Savant per-pitch-type stats)
        run: |
          python scripts/refresh_pitcher_arsenal.py > /tmp/pa.json && mv /tmp/pa.json data/pitcher_arsenal.json || true
        continue-on-error: true

      - name: Enrich hitters with projected OPS / K% / BB% / actual wOBA
        run: |
          python scripts/refresh_hitter_stats_enrich.py data/hitters.json > /tmp/h.json && mv /tmp/h.json data/hitters.json || true
        continue-on-error: true

      - name: Pull hitter Statcast percentile rankings
        run: |
          python scripts/refresh_hitter_percentiles.py > /tmp/hp.json && mv /tmp/hp.json data/hitter_percentiles.json || true
        continue-on-error: true

      - name: Refresh betting odds (ActionNetwork scrape)
        run: python scripts/refresh_odds.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Scrape AN archive (prior day finalized odds + PRO where public)
        run: python scripts/scrape_action_archive.py --start yesterday --end yesterday
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Odds fallback - multi-source (BettingPros/VegasInsider/ScoresAndOdds)
        run: |
          if [ ! -s data/odds.json ] || ! python -c "import json; d=json.load(open('data/odds.json')); exit(0 if d.get('games') and any(g.get('moneyline',{}).get('away') for g in d['games']) else 1)" 2>/dev/null; then
            echo "Primary odds empty - trying multi-source fallback"
            python scripts/refresh_odds_multi.py > data/odds.json || true
          fi
        continue-on-error: true

      - name: Odds fallback - The Odds API (if ODDS_API_KEY set and still empty)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -n "$ODDS_API_KEY" ] && { [ ! -s data/odds.json ] || ! python -c "import json; d=json.load(open('data/odds.json')); exit(0 if d.get('games') and any(g.get('moneyline',{}).get('away') for g in d['games']) else 1)" 2>/dev/null; }; then
            echo "Still empty - using The Odds API"
            python scripts/refresh_odds_oddsapi.py > data/odds.json || true
          fi
        continue-on-error: true

      - name: Refresh park factors + BP daily weather
        run: python scripts/refresh_park_data.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: Refresh SP platoon splits + opener detection
        run: python scripts/refresh_splits.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: BARTOLO train GBM (gated on .train-now file)
        if: hashFiles('.train-now') != ''
        timeout-minutes: 30
        run: |
          python scripts/bartolo_train.py
          rm -f .train-now
        continue-on-error: true

      - name: BARTOLO backfill historical sims (gated on .backfill-now file)
        if: hashFiles('.backfill-now') != ''
        timeout-minutes: 60
        run: |
          python scripts/bartolo_backfill.py
          rm -f .backfill-now
        continue-on-error: true
        env:
          BACKFILL_START: ${{ github.event.inputs.backfill_start || '' }}
          BACKFILL_END:   ${{ github.event.inputs.backfill_end   || '' }}
          BACKFILL_FORCE: ${{ github.event.inputs.backfill_force || '' }}

      - name: BARTOLO daily WP sim (gated on model pickle)
        run: python scripts/bartolo_daily.py
        continue-on-error: true
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '' }}

      - name: BARTOLO backtest (reads archive; pure local)
        run: python scripts/bartolo_backtest.py
        continue-on-error: true

      - name: Commit changed data (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json || true
          if ls data/odds_archive/*.json >/dev/null 2>&1; then git add data/odds_archive/*.json || true; fi
          [ -f scripts/bartolo/bartolo_model.pkl ] && git add scripts/bartolo/bartolo_model.pkl || true
          [ -d data/archive ] && git add data/archive || true
          git add -u .train-now 2>/dev/null || true
          git add -u .backfill-now 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Data refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
